##################################################################################################################
# Automations
##################################################################################################################

automation:
- id: '1588925532080'
  alias: HP Envy 6230 Page Reset
  description: >-
    Sets: - Total number of pages printed at the start of the period -
    Start Date of this period (to store a date to calculate the next one) - Maximum
    Rollover Allowance value for this month - Rollover Remaining to new Maximum Rollover
    Allowance value for this month - Rollover from overprint pages
  trigger:
    - at: "00:00:05"
      platform: time
  condition:
    - condition: template
      value_template: >-
        {% set start_date = states('input_datetime.hp_envy_6230_this_period_start_date') %}
        {% if start_date not in ['unknown', 'unavailable'] %}
          {{ now().day == as_datetime(start_date).day }}
        {% else %}
          false
        {% endif %}
  action:
    - action: input_number.set_value
      target:
        entity_id: input_number.hp_envy_6230_pages_rollover_allowance
      data:
        value: >-
          {% if is_state('input_select.hp_envy_6230_print_plan', 'Free') %}
            {## Free Plans accrue rollovers only from the OverPrint counter ##}
            {% if states('sensor.hp_envy_6230_pages_overprint_remaining') | int(0) > 0 %}
              {{ states('sensor.hp_envy_6230_pages_overprint_remaining') | int(0) }}
            {% else %}
              {{ states('sensor.hp_envy_6230_rollover_pages_remaining') | int(0) }}
            {% endif %}
          {% else %}
            {## Paid Plans accrue rollovers from both Unused Standard Prints, and from the OverPrint counter ##}
            {% set overprint = states('sensor.hp_envy_6230_pages_overprint') | int(0) %}
            {% set block_size = states('input_number.hp_envy_6230_pages_overprint_block_size') | int(1) %}
            {% set max_allowance = states('input_number.hp_envy_6230_pages_rollover_monthly_max_allowance') | int(0) %}
            {% set total_free = states('sensor.hp_envy_6230_total_free_pages_remaining') | int(0) %}
            
            {% if overprint > 0 and (overprint % block_size) > 0 %} 
              {{ block_size - (overprint % block_size) }}
            {% elif total_free > max_allowance %}
              {{ max_allowance }} 
            {% else %}
              {{ total_free }} 
            {% endif %}
          {% endif %}

    - action: input_number.set_value
      target:
        entity_id: input_number.hp_envy_6230_pages_at_month_start
      data:
        value: "{{ states('sensor.hp_envy_6230_total_pages_printed') | int(0) }}"

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.hp_envy_6230_this_period_start_date
      data:
        date: "{{ now().strftime('%Y-%m-%d') }}"

##################################################################################################################

- id: '1588925532191'
  alias: HP Envy 6230 Alert if remaining Free Pages count is X pages
  description: "Sends an alert if the HP Envy 6230 Free Pages count matches the notification threshold."
  trigger:
    - platform: template
      value_template: >-
        {{ states('sensor.hp_envy_6230_total_free_pages_remaining') | int(0) == states('input_number.hp_envy_6230_free_pages_remaining_notification') | int(0) }}
  condition: []
  action:
    - action: notify.pushover
      data:
        title: HP Instant Ink Alert
        message: >-
          <br/><b>Total Free Pages Remaining:</b> {{ states('sensor.hp_envy_6230_total_free_pages_remaining') | int(0) }} pages<br/><br/>
          &nbsp;&nbsp;• <b>Allowance Remaining:</b> {{ states('sensor.hp_envy_6230_allowance_pages_remaining') | int(0) }} pages<br/>
          &nbsp;&nbsp;• <b>Rollover Remaining:</b> {{ states('sensor.hp_envy_6230_rollover_pages_remaining') | int(0) }} pages<br/>
          &nbsp;&nbsp;• <b>Black Ink Level:</b> {{ states('input_number.hp_envy_6230_series_black_ink') | int(0) }}%<br/>
          &nbsp;&nbsp;• <b>Tri-Color Ink Level:</b> {{ states('input_number.hp_envy_6230_series_tri_color_ink') | int(0) }}%<br/><br/>
          <b>Days Until Next Renewal: </b>{{ states('sensor.hp_envy_6230_allowance_days_remaining') | int(0) }} days ({{ as_datetime(states('sensor.hp_envy_6230_next_renewal_date')).strftime('%d/%m/%Y') }})
        data:
          html: 1
          sound: spacealarm
          url: https://home.jb-net.co.uk/lovelace/other-devices-mobile
          priority: 1
          
    - action: notify.email
      data:
        title: "HP Instant Ink Alert"
        message: >-
          Total Free Pages Remaining: {{ states('sensor.hp_envy_6230_total_free_pages_remaining') | int(0) }} pages.
        data:
          html: >-
              <b>Total Free Pages Remaining:</b> {{ states('sensor.hp_envy_6230_total_free_pages_remaining') | int(0) }} pages<br/><br/>
              &nbsp;&nbsp;• <b>Allowance Remaining:</b> {{ states('sensor.hp_envy_6230_allowance_pages_remaining') | int(0) }} pages<br/>
              &nbsp;&nbsp;• <b>Rollover Remaining:</b> {{ states('sensor.hp_envy_6230_rollover_pages_remaining') | int(0) }} pages<br/>
              &nbsp;&nbsp;• <b>Black Ink Level:</b> {{ states('input_number.hp_envy_6230_series_black_ink') | int(0) }}%<br/>
              &nbsp;&nbsp;• <b>Tri-Color Ink Level:</b> {{ states('input_number.hp_envy_6230_series_tri_color_ink') | int(0) }}%<br/><br/>
              <b>Days Until Next Renewal: </b>{{ states('sensor.hp_envy_6230_allowance_days_remaining') | int(0) }} days ({{ as_datetime(states('sensor.hp_envy_6230_next_renewal_date')).strftime('%d/%m/%Y') }})
          
      
##################################################################################################################

- id: '1653739817420'
  alias: HP Envy 6230 change of Total Pages Printed
  description: >-
    Sets the input_number values for Total Pages Printed, Black Ink, and Tri-Colour Ink.
    These allow current values to show if Home Assistant is rebooted while the printer is switched off.
  trigger:
      # Trigger 1: Run whenever the printer comes online
    - platform: template
      value_template: "{{ states('sensor.hp_printer_total_pages') not in ['unavailable', 'unknown'] }}"
      
      # Trigger 2: Whenever sensor.hp_printer_total_pages changes
    - platform: state
      entity_id: sensor.hp_printer_total_pages
      
      # Trigger 3: Every 30 minutes
    - platform: time_pattern
      minutes: "/30"

  condition:      
  - condition: not
    conditions:
      - condition: or
        conditions:
          - condition: state
            entity_id: sensor.hp_printer_total_pages
            state:
              - unavailable
              - unknown
          - condition: state
            entity_id: sensor.hp_printer_black_remaining
            state:
              - unavailable
              - unknown
          - condition: state
            entity_id: sensor.hp_printer_colour_remaining
            state:
              - unavailable
              - unknown
  action:
    - action: input_number.set_value
      data:
        value: "{{ states('sensor.hp_envy_6230_total_pages_printed') | int(0) }}"
      target:
        entity_id: input_number.hp_envy_6230_total_pages_printed_inp
    - action: input_number.set_value
      data:
        value: "{{ states('sensor.hp_printer_black_remaining') | int(0) }}"
      target:
        entity_id: input_number.hp_envy_6230_series_black_ink
    - action: input_number.set_value
      data:
        value: "{{ states('sensor.hp_printer_colour_remaining') | int(0) }}"
      target:
        entity_id: input_number.hp_envy_6230_series_tri_color_ink
  mode: single
