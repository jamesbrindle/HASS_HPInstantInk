# hp_envy_6230_instant_ink.yaml

##################################################################################################################
# Inputs
##################################################################################################################

# Inputs for the HP Ink Print Plan
input_number:
# The total number of pages that had been printed
# at the start of this period of the printing plan
# Set by an automation
  hp_envy_6230_pages_at_month_start:
    name: HP Envy 6230 Printed Pages Total at month start
    min: 0
    max: 10000
    step: 1
    icon: mdi:printer
    mode: box
# The current monthly allowance number of pages
# SET THIS ONCE FOR THE INAUGURAL RUN, and after then it is set by an automation
  hp_envy_6230_pages_monthly_allowance:
    name: HP Envy Monthly Allowance Pages
    min: 10
    max: 300
    step: 1
    icon: mdi:printer
    mode: box
# The maximum number of rollover pages allowed.
# SET THIS ACCORDING TO YOUR PLAN
  hp_envy_6230_pages_rollover_monthly_max_allowance:
    name: HP Envy 6230 Rollover Maximum Pages
    min: 0
    max: 600
    step: 1
    icon: mdi:printer
    mode: box
# The number of pages that remain of the rollover allowance for this month
# SET THIS ONCE FOR THE INAUGURAL RUN, and after then it is set by an automation
  hp_envy_6230_pages_rollover_allowance:
    name: HP Envy 6230 Rollover Allowance Pages
    min: 0
    max: 600
    step: 1
    icon: mdi:printer
    mode: box
# The number of pages in each overprint block, when
# the Monthly Allowance plus Rollover are exceeded
# SET THIS ACCORDING TO YOUR PLAN
  hp_envy_6230_pages_overprint_block_size:
    name: HP Envy 6230 Over Print Block Size
    min: 0
    max: 100
    step: 1
    icon: mdi:printer
    mode: box
# The cost of each overprint block, in £
# SET THIS ACCORDING TO YOUR PLAN
  hp_envy_6230_pages_overprint_block_cost:
    name: HP Envy 6230 Over Print Block Cost
    min: 0
    max: 50
    step: 0.01
    icon: mdi:currency-gbp
    mode: box
# The number of free pages remaining to trigger a notification
  hp_envy_6230_free_pages_remaining_notification:
    name: HP Envy 6230 Free Pages Notification
    min: 1
    max: 15000
    step: 1
    icon: mdi:bell-alert
    mode: box

## A helper to store the total number of pages printed, to make it set
## the sensor.hp_envy_6230_total_pages_printed, after a reboot, and if
## the printer is switched off.
  hp_envy_6230_total_pages_printed_inp:
    name: HP Envy 6230 Set Total Pages Printed
    min: 1
    max: 150000
    step: 1
    icon: mdi:printer
    mode: box
## A helper to store the black ink amount, to make it set the graph
## after a reboot, and if the printer is switched off.
  hp_envy_6230_series_black_ink:
    name: HP Envy 6230 Black Ink
    min: 0
    max: 100
    step: 1
    icon: mdi:printer
    mode: box
    unit_of_measurement: '%'
## A helper to store the tri-colour ink amount, to make it set the graph
## after a reboot, and if the printer is switched off.
  hp_envy_6230_series_tri_color_ink:
    name: HP Envy 6230 Tri-Colour Ink
    min: 0
    max: 100
    step: 1
    icon: mdi:printer
    mode: box
    unit_of_measurement: '%'

# The start date of this period of the print plan
# SET THIS ONCE FOR THE INAUGURAL RUN, and after then it is set by an automation
input_datetime:
  hp_envy_6230_this_period_start_date:
    name: HP Envy 6230 This Period Start Date
    has_date: true
    has_time: false
    icon: mdi:calendar

# SET THIS ACCORDING TO YOUR PLAN
input_select:
  hp_envy_6230_print_plan:
    name: HP Envy 6230 Print Plan
    options:
      - Free
      - Paid
    icon: mdi:printer

##################################################################################################################
# Sensors
##################################################################################################################

template:
  - sensor:
      # 1. Total Pages Printed
      - name: "HP Envy 6230 Total Pages Printed"
        unique_id: hp_envy_6230_total_pages_printed
        icon: mdi:printer
        state: >-
          {% if states('sensor.hp_printer_total_pages') in ['unavailable', 'unknown'] %}
            {{ states('input_number.hp_envy_6230_total_pages_printed_inp') | int(0) }}
          {% else %}
            {{ states('sensor.hp_printer_total_pages') | int(0) }}
          {% endif %}
        unit_of_measurement: "pages"
        state_class: total_increasing

      # 2. Allowance Pages Remaining
      - name: "HP Envy 6230 Allowance Pages Remaining"
        unique_id: hp_envy_6230_allowance_pages_remaining
        icon: mdi:calendar-check
        state: >-
          {% set month_start = states('input_number.hp_envy_6230_pages_at_month_start') | int(0) %}
          {% set allowance = states('input_number.hp_envy_6230_pages_monthly_allowance') | int(0) %}
          {% set printed = states('sensor.hp_envy_6230_total_pages_printed') | int(0) %}
          {% if (month_start + allowance - printed) >= 0 %}
            {{ month_start + allowance - printed }}
          {% else %}
            0
          {% endif %}
        unit_of_measurement: "pages"

      # 3. Next Renewal Date
      - name: "HP Envy 6230 Next Renewal Date"
        unique_id: hp_envy_6230_next_renewal_date
        icon: mdi:calendar-today
        device_class: timestamp
        state: >-
          {% set date_str = states('input_datetime.hp_envy_6230_this_period_start_date') %}
          {% if date_str not in ['unavailable', 'unknown'] %}
            {% set start_dt = as_datetime(date_str) %}
            {% if start_dt is not none %}
              {# Calculate the same day in the next month safely #}
              {% set next_month = (start_dt.month % 12) + 1 %}
              {% set next_year = start_dt.year + (1 if start_dt.month == 12 else 0) %}
              {{ start_dt.replace(year=next_year, month=next_month) | as_local }}
            {% else %}
              unknown
            {% endif %}
          {% else %}
            unknown
          {% endif %}

      # 4. Allowance Days Remaining
      - name: "HP Envy 6230 Allowance Days Remaining"
        unique_id: hp_envy_6230_allowance_days_remaining
        icon: mdi:calendar-month
        state: >-
          {% set renewal = states('sensor.hp_envy_6230_next_renewal_date') %}
          {% if renewal not in ['unavailable', 'unknown'] %}
            {% set renewal_date = as_datetime(renewal) %}
            {% if renewal_date is not none %}
              {{ ((renewal_date.date() - now().date()).days) | int(0) }}
            {% else %}
              0
            {% endif %}
          {% else %}
            0
          {% endif %}
        unit_of_measurement: "days"

      # 5. Rollover Pages Remaining
      - name: "HP Envy 6230 Rollover Pages Remaining"
        unique_id: hp_envy_6230_rollover_pages_remaining
        icon: mdi:calendar-check
        state: >-
          {% set month_start = states('input_number.hp_envy_6230_pages_at_month_start') | int(0) %}
          {% set allowance = states('input_number.hp_envy_6230_pages_monthly_allowance') | int(0) %}
          {% set rollover = states('input_number.hp_envy_6230_pages_rollover_allowance') | int(0) %}
          {% set printed = states('sensor.hp_envy_6230_total_pages_printed') | int(0) %}
          {% if (month_start + allowance - printed < 0) and (month_start + allowance + rollover - printed >= 0) %}
            {{ month_start + allowance + rollover - printed }}
          {% elif (month_start + allowance - printed < 0) and (month_start + allowance + rollover - printed < 0) %}
            0
          {% else %}
            {{ rollover }}
          {% endif %}
        unit_of_measurement: "pages"

      # 6. Total Free Pages Remaining
      - name: "HP Envy 6230 Total Free Pages Remaining"
        unique_id: hp_envy_6230_total_free_pages_remaining
        icon: mdi:calendar-check
        state: >-
          {% set rollover = states('sensor.hp_envy_6230_rollover_pages_remaining') | int(0) %}
          {% set allowance = states('sensor.hp_envy_6230_allowance_pages_remaining') | int(0) %}
          {{ allowance + rollover }}
        unit_of_measurement: "pages"
     
     # 6.1 - A Mirror of Total Free Pages Remaining - For use with popup card   
      - name: "HP Envy 6230 Total Free Pages Remaining - Mirror"
        unique_id: hp_envy_6230_total_free_pages_remaining_mirror
        state: "{{ states('sensor.hp_envy_6230_total_free_pages_remaining') }}"
        unit_of_measurement: "pages" # Optional: keeps the unit consistent
        icon: mdi:calendar-check

      # 7. Over Allowance Prints
      - name: "HP Envy 6230 Over Allowance Prints"
        unique_id: hp_envy_6230_pages_overprint
        icon: mdi:alert
        state: >-
          {% set month_start = states('input_number.hp_envy_6230_pages_at_month_start') | int(0) %}
          {% set allowance = states('input_number.hp_envy_6230_pages_monthly_allowance') | int(0) %}
          {% set rollover = states('input_number.hp_envy_6230_pages_rollover_allowance') | int(0) %}
          {% set printed = states('sensor.hp_envy_6230_total_pages_printed') | int(0) %}
          {% if (month_start + allowance + rollover) < printed %}
            {{ printed - rollover - allowance - month_start }}
          {% else %}
            0
          {% endif %}
        unit_of_measurement: "pages"

      # 8. Over Allowance Cost
      - name: "HP Envy 6230 Over Allowance Cost"
        unique_id: hp_envy_6230_pages_overprint_cost
        state: >-
          {% set overprint = states('sensor.hp_envy_6230_pages_overprint') | int(0) %}
          {% set block_size = states('input_number.hp_envy_6230_pages_overprint_block_size') | int(1) %}
          {% set block_cost = states('input_number.hp_envy_6230_pages_overprint_block_cost') | float(0) %}
          {% if overprint == 0 %}
            0.00
          {% else %}
            {{ ((1 + ((overprint - 1) / block_size) | int(0)) * block_cost) | round(2) }}
          {% endif %}
        device_class: monetary
        unit_of_measurement: GBP

      # 9. Over Allowance Prints Remaining
      - name: "HP Envy 6230 Over Allowance Prints Remaining"
        unique_id: hp_envy_6230_pages_overprint_remaining
        icon: mdi:calendar-check
        state: >-
          {% set overprint = states('sensor.hp_envy_6230_pages_overprint') | int(0) %}
          {% set block_size = states('input_number.hp_envy_6230_pages_overprint_block_size') | int(1) %}
          {% if overprint == 0 or (overprint % block_size == 0) %}
            0
          {% else %}
            {{ block_size - (overprint % block_size) }}
          {% endif %}
        unit_of_measurement: "pages"

